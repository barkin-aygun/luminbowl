<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuminBowl</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="top-left-buttons" id="topLeftButtons"></div>
  <div class="top-buttons">
    <button class="top-btn" id="bloodBtn" title="Add blood splatters">&#129656;</button>
    <button class="top-btn" id="saveBtn" title="Save state">&#128190;</button>
    <button class="top-btn" id="screenshotBtn" title="Copy pitch to clipboard">&#128247;</button>
    <button class="top-btn" id="settingsBtn" title="Player settings">&#9881;</button>
  </div>
  <div class="toast" id="toast"></div>
  <div class="player-tooltip" id="playerTooltip"></div>
  <div class="pitch" id="pitch"></div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <h2>Player Settings</h2>
      <div class="modal-teams">
        <div class="modal-team red">
          <h3>Red Team</h3>
          <div id="redTeamList"></div>
        </div>
        <div class="modal-team blue">
          <h3>Blue Team</h3>
          <div id="blueTeamList"></div>
        </div>
      </div>
      <button class="modal-close" id="modalClose">Close</button>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
